<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Flying's pictures (星星 暖色)</title>
    <style>
        body{margin:0;overflow:hidden;background:#111;}
        span{position:absolute;display:inline-block;}
        svg{width:100%;height:100%;}
    </style>
</head>
<body>

<script>

    const colors=[0,20,40,10,30,50];

    function spawn(){

        const s=document.createElement("span");

        let size=70+Math.random()*130;

        s.style.width=size+"px";
        s.style.height=size+"px";

        let color=`hsl(${colors[Math.floor(Math.random()*colors.length)]},100%,50%)`;

        s.innerHTML=`<svg viewBox="0 0 100 100">
<polygon fill="${color}" points="50,5 61,38 95,38 67,58 78,90 50,70 22,90 33,58 5,38 39,38"/>
</svg>`;

        s.style.opacity=0.75+Math.random()*0.25;

        document.body.appendChild(s);

        let x=Math.random()*innerWidth;
        let y=Math.random()*innerHeight;

        let dx=(Math.random()-0.5)*6;
        let dy=(Math.random()-0.5)*6;

        s.style.left=x+"px";
        s.style.top=y+"px";

        const a=setInterval(()=>{

            x+=dx;
            y+=dy;

            size+=(Math.random()-0.5)*5;

            if(size<70)size=70;
            if(size>200)size=200;

            s.style.width=size+"px";
            s.style.height=size+"px";

            s.style.left=x+"px";
            s.style.top=y+"px";

            if(x<-200||x>innerWidth+200||y<-200||y>innerHeight+200){
                clearInterval(a);
                s.remove();
            }

        },30);

    }

    setInterval(spawn,200);

</script>

</body>
</html>
